<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="100%" height="100%">
    <!-- Medical Cross with DNA and Bar Chart details -->
    <g fill="none" stroke="#1E293B" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
        <!-- Medical Cross Outline -->
        <path d="M 165,70 L 235,70 L 235,135 L 300,135 L 300,205 L 235,205 L 235,270 L 165,270 L 165,205 L 100,205 L 100,135 L 165,135 Z" />
        
        <!-- DNA Helix inside -->
        <path d="M 185,85 C 215,115 215,145 185,175 C 155,205 155,235 185,265" stroke-width="8" stroke="#0D9488" />
        <path d="M 215,85 C 185,115 185,145 215,175 C 245,205 245,235 215,265" stroke-width="8" stroke="#4F46E5" />
        <line x1="194" y1="105" x2="206" y2="105" stroke-width="6" stroke="#475569" />
        <line x1="198" y1="130" x2="202" y2="130" stroke-width="6" stroke="#475569" />
        <line x1="194" y1="155" x2="206" y2="155" stroke-width="6" stroke="#475569" />
        <line x1="187" y1="180" x2="213" y2="180" stroke-width="6" stroke="#475569" />
        <line x1="194" y1="210" x2="206" y2="210" stroke-width="6" stroke="#475569" />
        <line x1="198" y1="235" x2="202" y2="235" stroke-width="6" stroke="#475569" />
        
        <!-- Bar Charts -->
        <rect x="115" y="170" width="10" height="25" fill="#475569" stroke="none" rx="2" />
        <rect x="130" y="160" width="10" height="35" fill="#0D9488" stroke="none" rx="2" />
        <rect x="145" y="150" width="10" height="45" fill="#4F46E5" stroke="none" rx="2" />
        
        <rect x="245" y="150" width="10" height="45" fill="#4F46E5" stroke="none" rx="2" />
        <rect x="260" y="140" width="10" height="55" fill="#0D9488" stroke="none" rx="2" />
        <rect x="275" y="130" width="10" height="65" fill="#475569" stroke="none" rx="2" />

        <!-- Swooping line -->
        <path d="M 110,185 Q 200,160 290,110" stroke="#4F46E5" stroke-width="10" />
    </g>
</svg>
